<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Personal Health Tracking System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="mark">+</div>
        <div class="name">Health Tracker</div>
      </div>
      <h1>Welcome back</h1>
      <div class="auth-sub">Sign in to access your health records and dashboard.</div>

      <div class="error-banner" id="errorBanner"></div>
      <div class="success-banner" id="successBanner"></div>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="off" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign In</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Create one</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // If a registration just happened, show success message
    const params = new URLSearchParams(window.location.search);
    if (params.get('registered') === '1') {
      const sb = document.getElementById('successBanner');
      sb.textContent = 'Account created successfully. Please sign in.';
      sb.style.display = 'block';
    }

    // If already logged in, go straight to dashboard
    if (getToken()) {
      window.location.href = 'dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBanner = document.getElementById('errorBanner');
      errorBanner.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const data = await apiRequest('/auth/login', { method: 'POST', body: { email, password } });
        setSession(data.token, data.user);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorBanner.textContent = err.message || 'Invalid email or password.';
        errorBanner.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
